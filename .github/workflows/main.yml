name: Deploy MERN App with Docker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest

      - name: Build and Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo docker stop frontend backend mongo || true
            sudo docker rm frontend backend mongo || true

            sudo docker network create mern-net || true

            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest

            sudo docker run -d --name mongo \
              --network mern-net \
              --restart always \
              -p 27017:27017 \
              mongo

            sleep 15

            sudo docker run -d --name backend \
              --network mern-net \
              --restart always \
              -p 5000:5000 \
              ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest

            sudo docker run -d --name frontend \
              --network mern-net \
              --restart always \
              -p 3000:3000 \
              ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest
